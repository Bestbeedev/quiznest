services:
  postgres:
    image: postgres:17-alpine
    container_name: quiznest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiznest
      POSTGRES_PASSWORD: quiznest
      POSTGRES_DB: quiznest
    ports:
      - "5432:5432"
    volumes:
      - quiznest-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiznest -d quiznest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quiznest-postgres-data:
