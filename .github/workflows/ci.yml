name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql://quiznest:quiznest@localhost:5432/quiznest?schema=public"
  BETTER_AUTH_SECRET: "ci-test-secret-not-real"
  BETTER_AUTH_URL: "http://localhost:3000"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_ROOT_DOMAIN: "localhost"
  NEXT_PUBLIC_FEDAPAY_PUBLIC_KEY: "pk_sandbox_ci"
  NEXT_PUBLIC_FEDAPAY_ENVIRONMENT: "sandbox"
  SUPER_ADMIN_EMAIL: "ci@test.com"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: quiznest
          POSTGRES_PASSWORD: quiznest
          POSTGRES_DB: quiznest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run Prisma migrations
        run: pnpm prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm next build
